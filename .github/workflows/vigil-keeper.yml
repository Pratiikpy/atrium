name: Atrium vigil-keeper — 5-minute cron loop

# Mirror of agents-cron.yml: GHA's tightest cron cadence is 5 min, which
# matches the Vigil liquidation_window_blocks parameter (30 blocks ~ 2 min
# on Arbitrum Sepolia plus a buffer). Each tick polls Scribe for paused
# MarginAccounts and logs intended actions; real execute_liquidation calls
# unblock once Vigil supports a configurable keeper_min_stake (Year-2;
# current contract hardcodes 1000 ETH on testnet, see
# services/vigil-keeper/src/tick.ts docstring + human_left.md).

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile --filter @atrium/vigil-keeper
      - name: keeper tick
        env:
          SCRIBE_URL: ${{ secrets.SCRIBE_URL }}
          ARBITRUM_SEPOLIA_RPC: ${{ secrets.ARBITRUM_SEPOLIA_RPC }}
          DEPLOYMENT_REGISTRY_URL: https://verify.atrium.fi/deployments/arbitrum_sepolia.json
          KEEPER_PRIVATE_KEY: ${{ secrets.KEEPER_PRIVATE_KEY }}
        run: pnpm --filter @atrium/vigil-keeper tick
