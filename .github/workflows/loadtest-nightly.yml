name: Atrium loadtest, nightly k6 + gas

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  loadtest:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
    env:
      BASE_URL: ${{ secrets.LOADTEST_BASE_URL || 'https://verify.atrium.fi' }}
      FORK_RPC: ${{ secrets.ARBITRUM_SEPOLIA_RPC || 'https://arbitrum-sepolia.publicnode.com' }}
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
      - uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: 20
          cache: pnpm
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69 || true
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6
      - run: pnpm install --frozen-lockfile --filter @atrium/loadtest
      - name: k6 latency probe
        working-directory: services/loadtest
        run: k6 run scripts/api-load.k6.js
      - name: contract gas estimation
        working-directory: services/loadtest
        run: node scripts/contract-gas.mjs
      - name: build report
        working-directory: services/loadtest
        run: node scripts/build-report.mjs
      - name: Create PR with loadtest data
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
        uses: peter-evans/create-pull-request@4320041ed380b20e97d388d56a7fb4f9b8c20e79 # v7.0.0
        with:
          branch: ci-data/${{ github.workflow }}
          title: "ci: ${{ github.workflow }} data update"
          commit-message: "ci: refresh ${{ github.workflow }} data"
          delete-branch: true
          add-paths: |
            apps/verify/public/loadtest/latest.json
      - name: upload artifacts
        if: always()
        uses: actions/upload-artifact@0b2256b8c012f0828dc542b3febcab082c67f72b # v4.3.4
        with:
          name: loadtest-${{ github.run_id }}
          path: |
            services/loadtest/summary.export.json
            services/loadtest/gas-report.json
            apps/verify/public/loadtest/latest.json
      - name: Notify ops on failure
        if: failure()
        run: |
          curl -X POST -H 'Content-Type: application/json' \
            -d "{\"content\":\"⚠️ ${{ github.workflow }} failed on ${{ github.ref_name }}: ${{ github.run_id }}\"}" \
            $DISCORD_OPS_WEBHOOK
        env:
          DISCORD_OPS_WEBHOOK: ${{ secrets.DISCORD_OPS_WEBHOOK }}
