# Audit fix (#28): both jobs run in LOCAL pending-UI mode (E2E_MODE defaults to
# 'local'), not against Sepolia, so the workflow-level name must not advertise
# "Sepolia" - it shows in the Actions UI, PR checks, and the Discord alert via
# ${{ github.workflow }}.
name: E2E (Playwright local pending-UI)

on:
  schedule:
    - cron: '0 3 * * *'
  pull_request:
    paths:
      - 'apps/verify/**'
      - 'apps/verify/tests/**'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  e2e:
    # Audit fix (#28): this job was titled "...on Sepolia" and wired
    # ARBITRUM_SEPOLIA_RPC + E2E_TEST_WALLET_PRIVATE_KEY, but playwright.config.ts
    # reads E2E_MODE (default 'local') + E2E_BASE_URL (default localhost) - none
    # of which were set - so it ran in LOCAL mode against the honest-pending UI
    # and every on-chain assertion was test.skip'd. The secret wiring was dead
    # and the name misrepresented the job as chain-verified. Renamed to reflect
    # reality and removed the dead wiring. To run the real on-chain journeys,
    # set repo vars E2E_MODE=sepolia + E2E_BASE_URL=<deployed verify URL> and the
    # E2E_TEST_WALLET_PRIVATE_KEY secret once the contracts + URL are live
    # (founder-gated on deploy; flipping E2E_MODE=sepolia also disables the
    # local auto-start web server).
    name: Five-journey E2E (local pending-UI)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter @atrium/verify exec playwright install --with-deps chromium
      - name: Run E2E journeys
        run: pnpm --filter @atrium/verify exec playwright test --project=chromium-desktop
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: apps/verify/playwright-report/
          retention-days: 30
      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-traces
          path: apps/verify/test-results/
          retention-days: 30
      - name: Notify ops on failure
        if: failure()
        run: |
          if [ -z "$DISCORD_OPS_WEBHOOK" ]; then
            echo "DISCORD_OPS_WEBHOOK not set; skipping failure notification."
            exit 0
          fi
          curl -X POST -H 'Content-Type: application/json' \
            -d "{\"content\":\"⚠️ ${{ github.workflow }} failed on ${{ github.ref_name }}: ${{ github.run_id }}\"}" \
            "$DISCORD_OPS_WEBHOOK"
        env:
          DISCORD_OPS_WEBHOOK: ${{ secrets.DISCORD_OPS_WEBHOOK }}

  e2e-mobile:
    # Audit fix (#28): same as the e2e job - ran in local pending-UI mode, not
    # against Sepolia. Dead secret wiring removed; name unchanged (it never
    # claimed Sepolia).
    name: Mobile flows E2E (local pending-UI)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter @atrium/verify exec playwright install --with-deps webkit
      - name: Run mobile E2E flows
        run: pnpm --filter @atrium/verify exec playwright test --project=mobile-safari
      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mobile-traces
          path: apps/verify/test-results/
          retention-days: 30
