name: notifier-cron

# Decommissioned 2026-05-28: notifier daemon now runs on DigitalOcean
# droplet (Phase 7). This workflow remains as `workflow_dispatch:` only
# for emergency manual triggers.

on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @atrium/notifier tick
        env:
          SCRIBE_URL:               ${{ secrets.SCRIBE_URL }}
          PREFS_API_URL:            ${{ secrets.NOTIFIER_PREFS_API_URL }}
          ATRIUM_INTERNAL_KEY:      ${{ secrets.NOTIFIER_INTERNAL_KEY }}
          ATRIUM_KV_REST_URL:       ${{ secrets.ATRIUM_KV_REST_URL }}
          ATRIUM_KV_REST_TOKEN:     ${{ secrets.ATRIUM_KV_REST_TOKEN }}
          TELEGRAM_BOT_TOKEN:       ${{ secrets.TELEGRAM_BOT_TOKEN }}
          RESEND_API_KEY:           ${{ secrets.RESEND_API_KEY }}
      - name: Notify ops on failure
        if: failure()
        run: |
          curl -X POST -H 'Content-Type: application/json' \
            -d "{\"content\":\"⚠️ ${{ github.workflow }} failed on ${{ github.ref_name }}: ${{ github.run_id }}\"}" \
            $DISCORD_OPS_WEBHOOK
        env:
          DISCORD_OPS_WEBHOOK: ${{ secrets.DISCORD_OPS_WEBHOOK }}
