name: Upptime

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: upptime
  cancel-in-progress: false

jobs:
  upptime:
    name: Monitor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: upptime/uptime-monitor@87ea79aa239b84db029f957d9cb43646474673ff # v1.42.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      # Discord notification on failure
      - name: Notify Discord on failure
        if: failure()
        uses: Ilshidur/action-discord@d2594079a10f1d6739ee50a2471f0ca57418b554 # v0.4.0
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_OPS_WEBHOOK }}
        with:
          args: "Upptime monitor workflow failed - check https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
