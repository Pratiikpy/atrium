name: Subgraph health check

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: subgraph-health
  cancel-in-progress: true

jobs:
  check:
    name: Check Scribe indexer lag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with: { node-version: 20 }
      - name: Check health
        id: health
        env:
          SCRIBE_URL: ${{ secrets.SCRIBE_URL }}
          ARBITRUM_SEPOLIA_RPC: ${{ secrets.ARBITRUM_SEPOLIA_RPC }}
        run: node scripts/check-scribe-health.mjs
      - name: Alert on sustained lag
        if: failure()
        env:
          DISCORD_OPS_WEBHOOK: ${{ secrets.DISCORD_OPS_WEBHOOK }}
        run: |
          curl -s -X POST "$DISCORD_OPS_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d '{"content":"⚠️ Scribe indexer lag > 200 blocks for 2 consecutive checks. Check https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
