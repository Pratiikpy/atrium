name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  FOUNDRY_PROFILE: default

jobs:
  lint:
    name: Lint + format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - uses: actions-rust-lang/setup-rust-toolchain@b113a30d27a8e59c969077c0a0168cc13dab5ffc # v1.8.0
        with:
          components: rustfmt, clippy
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
      - uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: cargo fmt
        run: cargo fmt --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: pnpm lint
        run: pnpm -r lint
      - name: Banned words check
        run: node scripts/check-banned-words.mjs

  test-rust:
    name: Rust + Stylus tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - uses: actions-rust-lang/setup-rust-toolchain@b113a30d27a8e59c969077c0a0168cc13dab5ffc # v1.8.0
      - name: cargo test
        run: cargo test --workspace --all-features
      # Audit gap (#58): the six Stylus crates are workspace-excluded, so their
      # host tests (plinth proptest invariants + span/math/eip712 unit tests)
      # do not run here. A naive `cargo test` per crate does NOT work: the crate
      # lib is crate-type=["lib","cdylib"] with the #[entrypoint] WasmVM host, so
      # the native test binary fails to link (unresolved native_keccak256/create1
      # /create2/delegate_call_contract). Enabling stylus-sdk/stylus-test breaks
      # compilation on this SDK pin. Running these host tests in CI needs a real
      # Stylus test harness (TestVM wiring) - tracked with #24/#25. Do not add a
      # `cargo test` step that links the cdylib until that harness lands; it goes
      # red, not green.
      - name: Build Stylus contracts
        env:
          STYLUS_ENDPOINT: https://arbitrum-sepolia.publicnode.com
        run: |
          cargo install --force cargo-stylus --version 0.10.7
          cd contracts/plinth      && cargo stylus check --endpoint "$STYLUS_ENDPOINT"
          cd ../coffer             && cargo stylus check --endpoint "$STYLUS_ENDPOINT"
          cd ../vigil              && cargo stylus check --endpoint "$STYLUS_ENDPOINT"
          cd ../sigil              && cargo stylus check --endpoint "$STYLUS_ENDPOINT"
          cd ../plinth-math        && cargo stylus check --endpoint "$STYLUS_ENDPOINT"
          cd ../plinth-oracle      && cargo stylus check --endpoint "$STYLUS_ENDPOINT"

  test-solidity:
    name: Solidity tests (Foundry)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@8f1998e9878d786675189ef566a2e4bf24869773 # v1.2.0
      - run: forge --version
      - run: forge build --sizes
      - run: forge test -vvv
      - name: Coverage
        run: forge coverage --report lcov --ir-minimum
      # Audit fix (#83): coverage was upload-only (informational) - it could
      # never regress-fail the build. This gate parses lcov.info and fails below
      # a line-coverage floor, so a coverage regression breaks CI. The floor is
      # set below the current measured level (13.91% as of 2026-05-29) with
      # margin; ratchet it UP as coverage improves. NOTE: this number is
      # SOLIDITY contracts only - the Stylus (Rust) crates are out of
      # forge-coverage scope (track Rust coverage separately if wanted).
      - name: Coverage floor gate (Solidity only)
        run: |
          node -e '
            const fs = require("fs");
            const t = fs.readFileSync("lcov.info", "utf8");
            let lf = 0, lh = 0;
            for (const l of t.split("\n")) {
              if (l.startsWith("LF:")) lf += parseInt(l.slice(3)) || 0;
              if (l.startsWith("LH:")) lh += parseInt(l.slice(3)) || 0;
            }
            const pct = lf ? (100 * lh / lf) : 0;
            const FLOOR = 12;
            console.log(`Solidity line coverage: ${pct.toFixed(2)}% (${lh}/${lf}); floor ${FLOOR}%`);
            console.log("NOTE: Solidity contracts only - Stylus crates are out of forge-coverage scope.");
            if (pct < FLOOR) { console.error(`Coverage ${pct.toFixed(2)}% is below the ${FLOOR}% floor`); process.exit(1); }
          '
      - uses: codecov/codecov-action@e28ff129e5465c2c0dcc6f003fc735cb6ae0c673 # v4.5.0
        if: always()
        with:
          files: lcov.info

  kani:
    name: Kani formal verification
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - uses: actions-rust-lang/setup-rust-toolchain@b113a30d27a8e59c969077c0a0168cc13dab5ffc # v1.8.0
      - name: Install Kani
        run: |
          cargo install --force --locked kani-verifier
          cargo kani setup
      - name: Kani harness-count regression gate
        run: |
          set -euo pipefail
          ACTUAL=$(grep -rE "^[[:space:]]*#\[kani::proof\]" contracts/ --include="*.rs" | wc -l | tr -d ' ')
          BASELINE=$(cat docs/kani-baseline.txt | tr -d '[:space:]')
          echo "kani proofs: actual=$ACTUAL baseline=$BASELINE"
          if [ "$ACTUAL" -lt "$BASELINE" ]; then
            echo "::error::Kani proof count regressed: $ACTUAL < $BASELINE. Either restore the deleted harness or update docs/kani-baseline.txt with a written reason."
            exit 1
          fi
      - name: Run Plinth proofs
        id: plinth
        run: cd contracts/plinth && cargo kani 2>&1 | tee /tmp/plinth-kani.log
      - name: Run Sigil proofs
        id: sigil
        run: cd contracts/sigil && cargo kani 2>&1 | tee /tmp/sigil-kani.log
      - name: Build kani-status.json
        if: always()
        run: |
          PASSED=$(grep -c "VERIFICATION:- SUCCESSFUL" /tmp/plinth-kani.log /tmp/sigil-kani.log || echo 0)
          TOTAL=5
          STATE="unknown"
          if [ "${{ steps.plinth.outcome }}" = "success" ] && [ "${{ steps.sigil.outcome }}" = "success" ]; then
            STATE="pass"
          elif [ "${{ steps.plinth.outcome }}" = "failure" ] || [ "${{ steps.sigil.outcome }}" = "failure" ]; then
            STATE="fail"
          fi
          mkdir -p apps/verify/public
          cat > apps/verify/public/kani-status.json <<EOF
          {
            "state": "$STATE",
            "passed": $PASSED,
            "total": $TOTAL,
            "last_run_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "proof_run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF
          cat apps/verify/public/kani-status.json
      - name: Create PR with kani-status update
        if: github.ref == 'refs/heads/main' && always()
        uses: peter-evans/create-pull-request@4320041ed380b20e97d388d56a7fb4f9b8c20e79 # v7.0.0
        with:
          branch: ci-data/kani
          title: "ci: kani-status.json data update"
          commit-message: "ci: refresh kani-status.json"
          delete-branch: true
          add-paths: |
            apps/verify/public/kani-status.json
      - name: Upload status as artifact
        if: always()
        uses: actions/upload-artifact@0b2256b8c012f0828dc542b3febcab082c67f72b # v4.3.4
        with:
          name: kani-status
          path: apps/verify/public/kani-status.json

  test-frontend:
    name: Frontend unit tests (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
      - uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @atrium/verify test

  frontend:
    name: Frontend build + Lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
      - uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @atrium/verify build
      - name: Lighthouse CI (mobile)
        run: |
          npm install -g @lhci/cli
          # Phase 11: remove the || echo to enforce 0.90 threshold once useatrium.me is the LHCI URL
          lhci autorun --config=.lighthouserc.json || echo "Lighthouse below threshold (soft-fail until prod URL)"

  subgraph:
    name: Subgraph build
    # graph test's matchstick binary does not support Ubuntu 24 yet.
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
      - uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @atrium/subgraph codegen
      - run: pnpm --filter @atrium/subgraph build
      - run: pnpm --filter @atrium/subgraph test
      - run: node scripts/check-event-indexing.mjs
      - run: node scripts/check-entity-writers.mjs

  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@83373cf2f8c4db6e24b41c1a9b086bb9619e9cd3 # v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # Incident 2026-05-24 follow-up (incidents/2026-05-24-deployer-key-leaked-to-local-temp-log.md):
      # required backstop to gitleaks, fail if a raw private-key literal is
      # committed in a key context (the leak was `--private-key 0x<64hex>` on a
      # cast / cargo-stylus command line). Context-aware so it does NOT false-fail
      # on tx/block hashes, event topic0, or Pyth feed/instrument ids (also 0x+64hex).
      # Known public test keys (Anvil/Hardhat) live only in test/seed/.env.example,
      # which are path-excluded.
      - name: No raw private keys in tracked source
        run: |
          PATTERN='(--private-key[ =]+0x[0-9a-fA-F]{64})|([A-Za-z_]*(PRIVATE_?KEY|DEPLOYER_?KEY|SECRET|MNEMONIC)[A-Za-z_]*[ =:]{1,3}.{0,2}0x[0-9a-fA-F]{64})'
          if git grep -nIiE "$PATTERN" -- \
              ':!**/*test*' ':!**/*.t.sol' ':!scripts/seed.s.sol' \
              ':!.env.example' ':!resources/**'; then
            echo "::error::Possible raw private key committed to source (see incidents/2026-05-24-...). Move it to an env var / keystore and rotate the key."
            exit 1
          fi
          echo "OK: no raw private-key literals in tracked source."
