name: lantern-cron

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
      - uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b # v4.0.3
        with:
          node-version: '20'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Trigger Lantern publish
        run: pnpm --filter @atrium/lantern-attestor publish-now
        env:
          SCRIBE_URL:                 ${{ secrets.SCRIBE_URL }}
          ARBITRUM_SEPOLIA_RPC:       ${{ secrets.ARBITRUM_SEPOLIA_RPC }}
          LANTERN_SIGNER_KEY:         ${{ secrets.LANTERN_SIGNER_KEY }}
          LANTERN_CONTRACT_ADDR:      ${{ secrets.LANTERN_CONTRACT_ADDR }}
          WEB3_STORAGE_TOKEN:         ${{ secrets.WEB3_STORAGE_TOKEN }}
          COFFER_ADDR:                ${{ secrets.COFFER_ADDR }}
          USDC_ADDR:                  ${{ secrets.USDC_ADDR }}
      - name: Notify ops on failure
        if: failure()
        run: |
          curl -X POST -H 'Content-Type: application/json' \
            -d "{\"content\":\"⚠️ ${{ github.workflow }} failed on ${{ github.ref_name }}: ${{ github.run_id }}\"}" \
            $DISCORD_OPS_WEBHOOK
        env:
          DISCORD_OPS_WEBHOOK: ${{ secrets.DISCORD_OPS_WEBHOOK }}
