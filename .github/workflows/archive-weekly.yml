name: archive-weekly

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:
    inputs:
      strategy:
        description: 'Strategy id to backtest (defaults to mean-reversion-v1)'
        required: false
        default: 'mean-reversion-v1'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: pip
      - name: Install archive deps
        run: |
          python -m pip install --upgrade pip
          pip install -e services/archive
      - name: Run weekly backtest
        env:
          SCRIBE_URL:               ${{ secrets.SCRIBE_URL }}
          ARBITRUM_SEPOLIA_RPC:     ${{ secrets.ARBITRUM_SEPOLIA_RPC }}
          RESEARCH_SIGNER_KEY:      ${{ secrets.RESEARCH_SIGNER_KEY }}
          WEB3_STORAGE_TOKEN:       ${{ secrets.WEB3_STORAGE_TOKEN }}
          RESEARCH_CONTRACT_ADDR:   ${{ secrets.RESEARCH_CONTRACT_ADDR }}
          INPUT_STRATEGY:           ${{ github.event.inputs.strategy || 'mean-reversion-v1' }}
        run: |
          python -m services.archive.src.research_loop --strategy "$INPUT_STRATEGY"
      - name: Create PR with attestation update
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: ci-data/${{ github.workflow }}
          title: "ci: ${{ github.workflow }} data update"
          commit-message: "ci: refresh ${{ github.workflow }} data"
          delete-branch: true
          add-paths: |
            apps/verify/public/research/latest.json
            services/archive/notebooks/*.ipynb
      - name: Notify ops on failure
        if: failure()
        run: |
          curl -X POST -H 'Content-Type: application/json' \
            -d "{\"content\":\"⚠️ ${{ github.workflow }} failed on ${{ github.ref_name }}: ${{ github.run_id }}\"}" \
            $DISCORD_OPS_WEBHOOK
        env:
          DISCORD_OPS_WEBHOOK: ${{ secrets.DISCORD_OPS_WEBHOOK }}
