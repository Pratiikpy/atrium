      --bg-sunk:   oklch(96% 0.005 85);
      --bg-raised: oklch(99.6% 0.003 85);
      --ink:       oklch(13% 0.008 60);
      --ink-soft:  oklch(28% 0.006 60);
      --muted:     oklch(54% 0.005 60);
      --faint:     oklch(74% 0.004 60);
      --line:      oklch(88% 0.004 60);
      --hairline:  oklch(93% 0.003 60);
      --accent:    oklch(48% 0.13 28);
      --accent-soft: oklch(70% 0.10 28);
      --testnet:   oklch(70% 0.13 70);
      --live:      oklch(58% 0.13 145);

      /* Dark section (used for agents + closing) */
      --dark-bg:   oklch(11% 0.008 60);
      --dark-ink:  oklch(96% 0.003 60);
      --dark-soft: oklch(72% 0.004 60);
      --dark-line: oklch(22% 0.006 60);

      --serif: "Instrument Serif", "Times New Roman", serif;
      --sans:  "Geist", ui-sans-serif, system-ui, sans-serif;
      --mono:  "Geist Mono", ui-monospace, monospace;

      --num-feature: "tnum" 1, "lnum" 1;

      --maxw: 1240px;
      --gutter: clamp(20px, 4vw, 56px);
      --section-pad: clamp(96px, 12vw, 160px);
    }

    [data-theme="dark"] {
      --bg:        oklch(10% 0.008 60);
      --bg-sunk:   oklch(8%  0.008 60);
      --bg-raised: oklch(13% 0.008 60);
      --ink:       oklch(96% 0.003 60);
      --ink-soft:  oklch(82% 0.005 60);
      --muted:     oklch(60% 0.005 60);
      --faint:     oklch(40% 0.005 60);
      --line:      oklch(22% 0.006 60);
      --hairline:  oklch(18% 0.006 60);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--ink);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.5;
      letter-spacing: -0.005em;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }
    ::selection { background: var(--ink); color: var(--bg); }

    /* Numbers */
    .num, .mono {
      font-family: var(--mono);
      font-feature-settings: var(--num-feature);
      font-variant-numeric: tabular-nums lining-nums;
    }
    .serif   { font-family: var(--serif); }
    .serif-i { font-family: var(--serif); font-style: italic; font-weight: 400; }

    .mono.cap, .cap {
      font-family: var(--mono);
      font-weight: 500;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }
    .muted    { color: var(--muted); }
    .ink-soft { color: var(--ink-soft); }
    .small    { font-size: 12.5px; }
    .strong   { font-weight: 500; color: var(--ink); }

    .container {
      max-width: var(--maxw);
      margin: 0 auto;
      padding-left: var(--gutter);
      padding-right: var(--gutter);
      position: relative;
    }

    /* The Atrium wordmark — italic Instrument Serif, tuned tracking */
    .atrium-mark {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 400;
      letter-spacing: -0.014em;
      color: var(--ink);
      display: inline-block;
    }

    /* Buttons — Apple-like pill */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      height: 44px; padding: 0 22px;
      font-family: var(--sans); font-size: 14.5px; font-weight: 500;
      letter-spacing: -0.005em;
      border-radius: 999px;
      border: 1px solid var(--ink);
      background: var(--ink); color: var(--bg);
      text-decoration: none; cursor: pointer;
      transition: transform 140ms ease, opacity 140ms ease;
    }
    .btn:hover { transform: translateY(-1px); opacity: 0.92; }
    .btn.small { height: 34px; padding: 0 14px; font-size: 13px; }
    .btn.ghost {
      background: transparent; color: var(--ink); border-color: var(--line);
    }
    .btn.ghost:hover { border-color: var(--ink); }
    .btn.light {
      background: var(--bg); color: var(--ink); border-color: var(--bg);
    }
    .btn.ghost-light {
      background: transparent; color: var(--bg); border-color: color-mix(in oklch, var(--bg) 28%, transparent);
    }
    .btn.ghost-light:hover { border-color: var(--bg); }
    .btn .arrow { display: inline-block; transition: transform 200ms ease; }
    .btn:hover .arrow { transform: translate(2px, -2px); }

    /* Pill */
    .pill {
      display: inline-flex; align-items: center; gap: 7px;
      height: 28px; padding: 0 12px 0 9px;
      border: 1px solid var(--line); border-radius: 999px;
      font-family: var(--mono); font-size: 11px;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--ink-soft); background: var(--bg-raised);
    }
    .pill .dot {
      width: 6px; height: 6px; border-radius: 999px; background: var(--testnet);
      box-shadow: 0 0 0 0 color-mix(in oklch, var(--testnet) 60%, transparent);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 color-mix(in oklch, var(--testnet) 50%, transparent); }
      50%      { box-shadow: 0 0 0 6px color-mix(in oklch, var(--testnet) 0%, transparent); }
    }

    /* Link underline */
    .ulink {
      color: inherit; text-decoration: none; position: relative; padding-bottom: 1px;
    }
    .ulink::after {
      content: ""; position: absolute; left: 0; right: 0; bottom: -1px;
      height: 1px; background: currentColor;
      transform: scaleX(0); transform-origin: right;
      transition: transform 320ms cubic-bezier(.7,.1,.2,1);
    }
    .ulink:hover::after { transform: scaleX(1); transform-origin: left; }

    /* ==========================================================
     * Nav
     * ========================================================== */
    .nav {
      position: sticky; top: 0; z-index: 50;
      background: color-mix(in oklch, var(--bg) 88%, transparent);
      backdrop-filter: saturate(140%) blur(16px);
      -webkit-backdrop-filter: saturate(140%) blur(16px);
      border-bottom: 1px solid transparent;
      transition: border-color 200ms ease;
    }
    .nav.scrolled { border-bottom-color: var(--hairline); }
    .nav-inner {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: 0 var(--gutter);
      height: 68px;
      display: grid; grid-template-columns: auto 1fr auto;
      align-items: center; gap: 32px;
    }
    .nav-brand { display: inline-flex; text-decoration: none; }
    .nav-links {
      display: flex; gap: 28px; justify-content: center;
    }
    .nav-link {
      font-size: 13.5px; color: var(--ink-soft);
      text-decoration: none;
      transition: color 120ms ease;
      letter-spacing: -0.003em;
    }
    .nav-link:hover { color: var(--ink); }
    .nav-right { display: flex; align-items: center; gap: 12px; }

    /* ==========================================================
     * Hero
     * ========================================================== */
    .hero {
      position: relative;
      padding: clamp(80px, 12vw, 144px) var(--gutter) clamp(72px, 9vw, 120px);
      overflow: hidden;
      isolation: isolate;
    }
    .hero-inner {
      max-width: 980px;
      margin: 0 auto;
      text-align: center;
      position: relative; z-index: 2;
    }
    .eyebrow {
      color: var(--muted);
      display: inline-block;
    }
    .h1 {
      font-family: var(--sans);
      font-weight: 500;
      font-size: clamp(48px, 7vw, 96px);
      line-height: 1.02;
      letter-spacing: -0.03em;
      margin: 24px 0 0;
      color: var(--ink);
    }
    .accent-grad {
      background: linear-gradient(120deg,
        var(--ink) 0%,
        var(--accent) 60%,
        var(--accent-soft) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }
    .hero-sub {
      font-size: clamp(17px, 1.4vw, 20px);
      line-height: 1.55;
      color: var(--ink-soft);
      max-width: 600px;
      margin: 28px auto 0;
      text-wrap: pretty;
    }
    .hero-cta {
      margin-top: 36px;
      display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
    }
    .hero-trust {
      margin-top: 56px;
      display: flex; gap: 28px; justify-content: center; flex-wrap: wrap;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11.5px;
      letter-spacing: 0.04em;
    }
    .trust-item { display: inline-flex; align-items: center; gap: 8px; }
    .trust-dot {
      width: 5px; height: 5px; border-radius: 999px; background: var(--live);
    }
    .hero-glow {
      /* legacy class — unused; kept to avoid breaking any references */
      display: none;
    }

    /* ==========================================================
     * HERO — MONUMENTAL DARK IMPLUVIUM (signature)
     * ========================================================== */
    .hero-monument {
      position: relative;
      color: var(--dark-ink);
      padding: clamp(64px, 8vw, 112px) var(--gutter) clamp(80px, 9vw, 128px);
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(ellipse 80% 60% at 50% 55%,
          color-mix(in oklch, var(--accent) 7%, transparent) 0%,
          transparent 65%),
        var(--dark-bg);
    }
    .hero-grid {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    .hero-vignette {
      position: absolute; inset: 0; pointer-events: none; z-index: 1;
      background:
        radial-gradient(ellipse 80% 50% at 50% 100%, transparent 40%, rgba(0,0,0,0.55) 100%),
        radial-gradient(ellipse 70% 40% at 50% 0%,   transparent 40%, rgba(0,0,0,0.40) 100%);
    }
    .hero-monument-inner {
      position: relative; z-index: 2;
      max-width: 1320px;
      margin: 0 auto;
      display: flex; flex-direction: column;
      gap: clamp(40px, 5vw, 64px);
    }
    .hero-monument-top {
      text-align: center;
      max-width: 920px;
      margin: 0 auto;
    }
    .hero-eyebrow-clean {
      display: inline-flex; align-items: center; gap: 14px;
      color: color-mix(in oklch, white 60%, transparent);
      font-family: var(--mono); font-weight: 500;
      font-size: 10.5px; letter-spacing: 0.22em;
      text-transform: uppercase;
    }
    .hero-eyebrow-clean .hairline-rule {
      display: inline-block;
      width: 56px; height: 1px;
      background: color-mix(in oklch, white 28%, transparent);
    }
    .hero-eyebrow-clean .eyebrow-text {
      white-space: nowrap;
    }
    .pulse-amber {
      width: 6px; height: 6px; border-radius: 999px;
      background: var(--testnet);
      box-shadow: 0 0 0 0 color-mix(in oklch, var(--testnet) 60%, transparent);
      animation: pulse 2.4s ease-in-out infinite;
    }
    .hero-monument-h {
      font-family: var(--sans);
      font-weight: 500;
      font-size: clamp(36px, 5.4vw, 78px);
      line-height: 1.04;
      letter-spacing: -0.028em;
      color: var(--dark-ink);
      margin: 28px 0 0;
      text-wrap: balance;
    }
    .hero-light { color: color-mix(in oklch, white 55%, transparent); }
    .hero-impluvium-wrap {
      position: relative;
      max-width: 1180px;
      width: 100%;
      margin: 0 auto;
    }
    .hero-impluvium-wrap::before {
      content: "";
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 70%; height: 60%;
      background: radial-gradient(closest-side,
        color-mix(in oklch, var(--accent) 18%, transparent) 0%,
        transparent 70%);
      filter: blur(40px);
      z-index: 0;
      pointer-events: none;
    }

    /* Dark variant of the impluvium — flip CSS vars locally */
    .impluvium-dark {
      --bg:        oklch(12% 0.008 60);
      --bg-sunk:   oklch(9%  0.008 60);
      --bg-raised: oklch(14% 0.008 60);
      --ink:       oklch(96% 0.003 60);
      --ink-soft:  oklch(82% 0.005 60);
      --muted:     oklch(60% 0.005 60);
      --faint:     oklch(40% 0.005 60);
      --line:      color-mix(in oklch, white 14%, transparent);
      --hairline:  color-mix(in oklch, white 8%, transparent);
      position: relative; z-index: 1;
    }
    .impluvium-dark .impluvium {
      border-color: color-mix(in oklch, white 22%, transparent);
      background: color-mix(in oklch, white 3%, transparent);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .impluvium-dark .pool {
      border-color: color-mix(in oklch, white 32%, transparent);
      background: color-mix(in oklch, white 4%, transparent);
      box-shadow:
        0 0 80px color-mix(in oklch, var(--accent) 18%, transparent),
        inset 0 0 60px color-mix(in oklch, var(--accent) 6%, transparent);
    }
    .impluvium-dark .pool-figure {
      color: var(--dark-ink);
      text-shadow: 0 0 32px color-mix(in oklch, var(--accent) 32%, transparent);
    }
    .impluvium-dark .venue-card {
      background: color-mix(in oklch, white 4%, transparent);
      border-color: color-mix(in oklch, white 14%, transparent);
      color: var(--dark-ink);
    }
    .impluvium-dark .venue-card.hover {
      background: color-mix(in oklch, white 8%, transparent);
      border-color: color-mix(in oklch, var(--accent) 65%, transparent);
    }
    .impluvium-dark .draw-label,
    .impluvium-dark .draw-footer {
      border-color: color-mix(in oklch, white 24%, transparent);
    }
    .impluvium-dark .scale-rule .scale-line span {
      border-color: color-mix(in oklch, white 50%, transparent);
    }
    .impluvium-dark .scale-rule .scale-line span:nth-child(odd) {
      background: color-mix(in oklch, white 35%, transparent);
    }
    .impluvium-dark input[type="range"]::-webkit-slider-runnable-track {
      background: color-mix(in oklch, white 22%, transparent);
    }
    .impluvium-dark input[type="range"]::-webkit-slider-thumb { background: var(--dark-ink); }
    .impluvium-dark input[type="range"]::-moz-range-track { background: color-mix(in oklch, white 22%, transparent); }
    .impluvium-dark input[type="range"]::-moz-range-thumb { background: var(--dark-ink); }

    .hero-monument-bot {
      display: flex; flex-direction: column; align-items: center; gap: 28px;
      text-align: center;
    }
    .hero-cta-dark { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .hero-trust-dark {
      display: flex; gap: 28px; flex-wrap: wrap; justify-content: center;
      color: color-mix(in oklch, white 55%, transparent);
      font-family: var(--mono); font-size: 11.5px; letter-spacing: 0.06em;
    }
    .hero-trust-dark > span {
      display: inline-flex; align-items: center; gap: 7px;
    }
    .hero-trust-dark .td {
      width: 5px; height: 5px; border-radius: 999px; background: var(--live);
    }

    /* Nav while sitting over the dark hero — solid dark, never transparent */
    .nav.over-dark {
      background: color-mix(in oklch, var(--dark-bg) 92%, transparent) !important;
      backdrop-filter: saturate(140%) blur(16px);
      -webkit-backdrop-filter: saturate(140%) blur(16px);
      border-bottom: 1px solid color-mix(in oklch, white 8%, transparent) !important;
    }
    .nav.over-dark .atrium-mark { color: var(--dark-ink); }
    .nav.over-dark .nav-link { color: color-mix(in oklch, white 65%, transparent); }
    .nav.over-dark .nav-link:hover { color: var(--dark-ink); }
    .nav.over-dark .pill {
      background: color-mix(in oklch, white 6%, transparent);
      border-color: color-mix(in oklch, white 16%, transparent);
      color: color-mix(in oklch, white 70%, transparent);
    }
    .nav.over-dark .btn {
      background: var(--dark-ink); color: var(--dark-bg); border-color: var(--dark-ink);
    }

    /* ==========================================================
     * FLOOR PLAN — the 18 subsystems as a Roman domus
     * ========================================================== */
    .floorplan-section {
      padding: var(--section-pad) 0;
      border-top: 1px solid var(--hairline);
      background:
        radial-gradient(ellipse 70% 80% at 50% 70%,
          color-mix(in oklch, var(--accent) 3%, transparent) 0%,
          transparent 60%),
        var(--bg);
    }
    .floorplan-frame {
      max-width: 1320px;
      margin: 56px auto 0;
      padding: 0 var(--gutter);
    }
    .floor-wrap {
      position: relative;
      --floor-ink: var(--ink);
      --floor-bg: var(--bg-raised);
      --floor-muted: var(--muted);
      color: var(--floor-ink);
    }
    .floor-head {
      border-color: var(--floor-ink);
      margin-bottom: 28px;
    }
    .floor-svg {
      display: block;
      width: 100%;
      height: auto;
      background:
        linear-gradient(transparent 31px, color-mix(in oklch, var(--floor-ink) 4%, transparent) 32px) 0 0 / 100% 32px,
        linear-gradient(90deg, transparent 31px, color-mix(in oklch, var(--floor-ink) 4%, transparent) 32px) 0 0 / 32px 100%,
        var(--floor-bg);
      border: 1px solid var(--floor-ink);
    }
    .floor-svg .floor-name {
      font-family: var(--serif); font-style: italic;
      font-size: 24px; letter-spacing: -0.012em;
    }
    .floor-svg .floor-mono {
      font-family: var(--mono); font-weight: 500;
      text-transform: uppercase;
    }
    .floor-svg .room { transition: opacity 200ms ease; }
    .floor-detail {
      margin-top: 16px;
      padding: 18px 22px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--bg-raised);
      min-height: 100px;
    }
    /* When any room is hovered, dim the others slightly */
    .floor-wrap:has(.room.hover) .room:not(.hover) { opacity: 0.35; }

    @keyframes aqFlow { to { stroke-dashoffset: -24; } }
    @keyframes rainFall { to { stroke-dashoffset: -18; } }
    @keyframes lanternBreathe {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 1; }
    }

    /* Reveal animation */
    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .rise { animation: rise 800ms cubic-bezier(.2,.7,.2,1) both; }
    .rise.d1 { animation-delay: 80ms; }
    .rise.d2 { animation-delay: 180ms; }
    .rise.d3 { animation-delay: 320ms; }
    .rise.d4 { animation-delay: 480ms; }

    /* ==========================================================
     * Section heads (centered, Apple-like)
     * ========================================================== */
    .section-head.centered {
      text-align: center;
      max-width: 820px;
      margin: 0 auto;
    }
    .h2 {
      font-family: var(--sans);
      font-weight: 500;
      font-size: clamp(36px, 4.4vw, 64px);
      line-height: 1.04;
      letter-spacing: -0.025em;
      margin: 18px 0 0;
      color: var(--ink);
      text-wrap: balance;
    }
    .section-sub {
      font-size: clamp(16px, 1.2vw, 18px);
      line-height: 1.55;
      color: var(--ink-soft);
      max-width: 620px;
      margin: 22px auto 0;
      text-wrap: pretty;
    }

    /* ==========================================================
     * Impluvium section (KEPT — chrome lightly cleaned up)
     * ========================================================== */
    .impluvium-section {
      padding: var(--section-pad) 0;
      border-top: 1px solid var(--hairline);
    }
    .draw-label, .draw-footer {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--ink);
    }
    .draw-footer {
      border-bottom: none;
      border-top: 1px solid var(--ink);
      margin-top: 18px;
      padding-top: 18px; padding-bottom: 0;
      align-items: center;
      gap: 32px;
    }
    .scale-rule { width: 260px; color: var(--muted); }
    .scale-rule .scale-line {
      display: grid; grid-template-columns: repeat(5, 1fr); height: 8px;
      margin-bottom: 6px;
    }
    .scale-rule .scale-line span {
      border-left: 1px solid var(--ink);
      border-bottom: 1px solid var(--ink);
    }
    .scale-rule .scale-line span:nth-child(odd) { background: var(--ink); }
    .scale-rule .scale-line span:last-child { border-right: 1px solid var(--ink); }
    .leverage-control {
      display: grid; grid-template-columns: auto 1fr auto;
      gap: 18px; align-items: center; flex: 1;
    }

    .impluvium {
      position: relative;
      padding: 32px;
      border: 1px solid var(--ink);
      background: var(--bg-raised);
      display: grid;
      grid-template-rows: auto 200px auto;
      gap: 32px;
    }
    .impluvium-row {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
      position: relative; z-index: 2;
    }
    .impluvium-pool-row {
      position: relative; display: flex; justify-content: center;
      z-index: 2;
    }
    .pool {
      width: min(620px, 70%);
      border: 1px solid var(--ink);
      background: var(--bg);
      position: relative;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
    }
    .pool-corner {
      position: absolute;
      font-size: 9.5px; color: var(--ink-soft);
    }
    .pool-corner.top-left  { top: 12px; left: 14px; }
    .pool-corner.top-right { top: 12px; right: 14px; }
    .pool-corner.bot-left  { bottom: 12px; left: 14px; }
    .pool-corner.bot-right { bottom: 12px; right: 14px; }
    .pool-center { text-align: center; position: relative; z-index: 1; }
    .pool-figure {
      font-size: clamp(36px, 4.6vw, 56px);
      font-weight: 500; letter-spacing: -0.025em; line-height: 1;
    }
    .live-dot {
      display: inline-block; width: 6px; height: 6px; border-radius: 999px;
      background: var(--live); margin-right: 6px;
      vertical-align: 1px;
    }
    .pool-hatch { position: absolute; inset: 0; opacity: 0.05; pointer-events: none; color: var(--ink); }

    .impluvium-flow { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
    @keyframes flowDash { to { stroke-dashoffset: -40; } }

    .venue-card {
      padding: 14px 14px 12px;
      border: 1px solid var(--line);
      background: var(--bg);
      cursor: pointer;
      transition: border-color 160ms ease, transform 160ms ease, background 160ms ease;
