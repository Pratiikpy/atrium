      --bg:        oklch(98.4% 0.004 85);
      --bg-sunk:   oklch(96% 0.005 85);
      --bg-raised: oklch(99.6% 0.003 85);
      --side-bg:   oklch(97% 0.005 85);
      --ink:       oklch(13% 0.008 60);
      --ink-soft:  oklch(28% 0.006 60);
      --muted:     oklch(54% 0.005 60);
      --faint:     oklch(74% 0.004 60);
      --line:      oklch(88% 0.004 60);
      --hairline:  oklch(93% 0.003 60);
      --accent:    oklch(48% 0.13 28);
      --accent-soft: oklch(70% 0.10 28);
      --testnet:   oklch(70% 0.13 70);
      --live:      oklch(58% 0.13 145);
      --neg:       oklch(56% 0.16 28);

      --dark-bg:   oklch(11% 0.008 60);
      --dark-ink:  oklch(96% 0.003 60);
      --dark-soft: oklch(72% 0.004 60);
      --dark-line: oklch(22% 0.006 60);

      --serif: "Instrument Serif", "Times New Roman", serif;
      --sans:  "Geist", ui-sans-serif, system-ui, sans-serif;
      --mono:  "Geist Mono", ui-monospace, monospace;

      --num-feature: "tnum" 1, "lnum" 1;

      --side-w: 248px;
      --top-h:  56px;
      --pad:    32px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--ink);
      font-family: var(--sans);
      font-size: 14px; line-height: 1.5;
      letter-spacing: -0.005em;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    ::selection { background: var(--ink); color: var(--bg); }

    .num, .mono {
      font-family: var(--mono);
      font-feature-settings: var(--num-feature);
      font-variant-numeric: tabular-nums lining-nums;
    }
    .serif   { font-family: var(--serif); }
    .serif-i { font-family: var(--serif); font-style: italic; }

    .mono.cap, .cap {
      font-family: var(--mono);
      font-weight: 500;
      font-size: 10.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }
    .muted    { color: var(--muted); }
    .ink-soft { color: var(--ink-soft); }
    .small    { font-size: 12.5px; }
    .strong   { font-weight: 500; color: var(--ink); }
    .pos { color: var(--live); }
    .neg { color: var(--neg); }

    .atrium-mark {
      font-family: var(--serif);
      font-style: italic;
      font-weight: 400;
      letter-spacing: -0.014em;
      color: var(--ink);
      display: inline-block;
    }

    /* =====================================================================
     * App layout
     * ===================================================================== */
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: var(--side-w) 1fr;
    }

    /* =====================================================================
     * Sidebar
     * ===================================================================== */
    .side {
      background: var(--side-bg);
      border-right: 1px solid var(--hairline);
      display: flex; flex-direction: column;
      padding: 16px 14px 16px;
      position: sticky; top: 0; height: 100vh;
      overflow-y: auto;
    }
    .side-brand {
      padding: 8px 10px 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .side-search {
      margin: 2px 6px 16px;
      padding: 7px 10px;
      background: var(--bg);
      border: 1px solid var(--hairline);
      border-radius: 8px;
      display: flex; align-items: center; gap: 8px;
      color: var(--muted);
      font-size: 12.5px;
      cursor: text;
    }
    .side-search .kbd {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 10.5px;
      padding: 2px 6px;
      background: var(--bg-raised);
      border: 1px solid var(--hairline);
      border-radius: 4px;
      color: var(--muted);
    }
    .side-section { margin-top: 16px; }
    .side-section-head {
      padding: 0 10px 8px;
      font-family: var(--mono); font-size: 10px;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--muted);
    }
    .side-link {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 10px;
      margin: 1px 0;
      border-radius: 8px;
      text-decoration: none;
      color: var(--ink-soft);
      font-size: 13px;
      transition: background 100ms ease, color 100ms ease;
      position: relative;
    }
    .side-link .si { width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; opacity: 0.7; }
    .side-link:hover { background: var(--bg); color: var(--ink); }
    .side-link.active {
      background: var(--ink); color: var(--bg);
    }
    .side-link.active .si { opacity: 1; }
    .side-link .pill-mini {
      margin-left: auto;
      font-family: var(--mono); font-size: 10px;
      padding: 1px 6px; border-radius: 999px;
      background: color-mix(in oklch, var(--ink) 8%, transparent);
      color: var(--ink-soft);
    }
    .side-link.active .pill-mini {
      background: color-mix(in oklch, var(--bg) 18%, transparent);
      color: var(--bg);
    }
    .side-foot {
      margin-top: auto; padding: 8px 6px 4px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .side-wallet {
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--hairline);
      border-radius: 10px;
      display: grid; grid-template-columns: 22px 1fr auto; gap: 10px; align-items: center;
    }
    .side-wallet .avatar {
      width: 22px; height: 22px; border-radius: 999px;
      background: linear-gradient(135deg, var(--accent) 0%, oklch(40% 0.08 280) 100%);
    }
    .side-wallet .ad {
      font-family: var(--mono); font-size: 11.5px; color: var(--ink);
    }
    .side-wallet .net { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .side-wallet .chev { color: var(--muted); }

    /* =====================================================================
     * Topbar + page chrome
     * ===================================================================== */
    .app-main { display: flex; flex-direction: column; min-width: 0; }
    .topbar {
      height: var(--top-h);
      padding: 0 var(--pad);
      border-bottom: 1px solid var(--hairline);
      display: grid; grid-template-columns: 1fr auto;
      align-items: center;
      background: color-mix(in oklch, var(--bg) 88%, transparent);
      backdrop-filter: saturate(140%) blur(12px);
      -webkit-backdrop-filter: saturate(140%) blur(12px);
      position: sticky; top: 0; z-index: 30;
    }
    .crumb {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px;
    }
    .crumb .crumb-main {
      font-weight: 500; color: var(--ink); letter-spacing: -0.005em;
    }
    .crumb .crumb-sep { color: var(--faint); }
    .crumb .crumb-sub { color: var(--ink-soft); }
    .topbar-right {
      display: flex; align-items: center; gap: 12px;
    }
    .pill {
      display: inline-flex; align-items: center; gap: 7px;
      height: 26px; padding: 0 10px 0 9px;
      border: 1px solid var(--line); border-radius: 999px;
      font-family: var(--mono); font-size: 10.5px;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--ink-soft); background: var(--bg-raised);
    }
    .pill .dot {
      width: 6px; height: 6px; border-radius: 999px; background: var(--live);
      box-shadow: 0 0 0 0 color-mix(in oklch, var(--live) 60%, transparent);
      animation: pulse 2.4s ease-in-out infinite;
    }
    .pill.testnet .dot { background: var(--testnet); }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 color-mix(in oklch, var(--live) 50%, transparent); }
      50%      { box-shadow: 0 0 0 6px color-mix(in oklch, var(--live) 0%, transparent); }
    }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      height: 32px; padding: 0 14px;
      font-family: var(--sans); font-size: 12.5px; font-weight: 500;
      letter-spacing: -0.005em;
      border-radius: 8px;
      border: 1px solid var(--ink);
      background: var(--ink); color: var(--bg);
      text-decoration: none; cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease;
    }
    .btn:hover { opacity: 0.9; }
    .btn.ghost {
      background: transparent; color: var(--ink); border-color: var(--line);
    }
    .btn.ghost:hover { border-color: var(--ink); }
    .btn.large { height: 40px; padding: 0 18px; font-size: 13.5px; border-radius: 10px; }
    .btn.tiny  { height: 24px; padding: 0 10px; font-size: 11.5px; border-radius: 6px; }
    .btn.danger { background: var(--neg); color: var(--bg); border-color: var(--neg); }

    .icon-btn {
      width: 32px; height: 32px;
      display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid var(--line); border-radius: 8px;
      background: var(--bg-raised); color: var(--ink-soft);
      cursor: pointer;
      transition: border-color 120ms ease, color 120ms ease;
    }
    .icon-btn:hover { border-color: var(--ink); color: var(--ink); }

    /* Main content */
    .view {
      padding: 28px var(--pad) 96px;
      max-width: 1480px;
      margin: 0 auto;
      width: 100%;
    }
    .view-head {
      display: flex; justify-content: space-between; align-items: flex-end;
      margin-bottom: 28px;
    }
    .view-title {
      font-family: var(--sans);
      font-weight: 500;
      font-size: 28px;
      letter-spacing: -0.022em;
      line-height: 1.1;
      color: var(--ink);
      margin: 0;
    }
    .view-sub {
      margin-top: 6px;
      color: var(--ink-soft);
      font-size: 13.5px;
    }
    .view-actions { display: flex; gap: 8px; }

    /* Cards */
    .card {
      background: var(--bg-raised);
      border: 1px solid var(--hairline);
      border-radius: 12px;
      padding: 18px 20px;
    }
    .card.bordered { border-color: var(--line); }
    .card-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .card-title {
      font-weight: 500; font-size: 14px; color: var(--ink);
    }
    .card-divider {
      height: 1px; background: var(--hairline);
      margin: 14px -20px;
    }

    /* Stat */
    .stat-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
    }
    .stat-card {
      padding: 16px 18px;
      background: var(--bg-raised);
      border: 1px solid var(--hairline);
      border-radius: 12px;
    }
    .stat-label { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .stat-value { font-family: var(--mono); font-size: 26px; letter-spacing: -0.022em; line-height: 1; margin-top: 10px; color: var(--ink); }
    .stat-sub { font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-top: 8px; }

    /* Tables */
    .table {
      width: 100%;
      border-collapse: collapse;
    }
    .table thead th {
      font-family: var(--mono);
      font-weight: 500; font-size: 10.5px;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
    }
    .table tbody td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--hairline);
      font-size: 13.5px;
      color: var(--ink-soft);
      vertical-align: middle;
    }
    .table tbody tr:last-child td { border-bottom: none; }
    .table tbody tr:hover { background: color-mix(in oklch, var(--ink) 3%, transparent); }
    .table tbody td.strong { color: var(--ink); font-weight: 500; }
    .table .num { color: var(--ink); }
    .table .ar { text-align: right; }

    /* Tags */
    .tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      font-family: var(--mono); font-size: 10.5px;
      letter-spacing: 0.08em; text-transform: uppercase;
      border: 1px solid var(--line);
      color: var(--ink-soft);
      background: var(--bg-raised);
    }
    .tag.green {
      color: var(--live);
      border-color: color-mix(in oklch, var(--live) 30%, transparent);
      background: color-mix(in oklch, var(--live) 8%, transparent);
    }
    .tag.red {
      color: var(--neg);
      border-color: color-mix(in oklch, var(--neg) 30%, transparent);
      background: color-mix(in oklch, var(--neg) 8%, transparent);
    }
    .tag.amber {
      color: oklch(60% 0.14 70);
      border-color: color-mix(in oklch, var(--testnet) 30%, transparent);
      background: color-mix(in oklch, var(--testnet) 10%, transparent);
    }

    /* Forms */
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label {
      font-family: var(--mono); font-size: 10.5px;
      letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted);
    }
    .input, .select {
      width: 100%;
      padding: 11px 12px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 8px;
      font-family: var(--sans); font-size: 14px;
      color: var(--ink);
      transition: border-color 120ms ease;
    }
    .input:focus, .select:focus { outline: none; border-color: var(--ink); }
    .input.num-input {
      font-family: var(--mono); font-size: 22px; letter-spacing: -0.012em;
      padding: 14px 14px;
    }
    .seg {
      display: inline-flex; padding: 2px;
      background: var(--bg-sunk); border-radius: 8px; gap: 2px;
      border: 1px solid var(--hairline);
    }
    .seg > button {
      padding: 6px 14px;
      border: none; background: transparent;
      font-family: var(--sans); font-size: 12.5px;
      color: var(--ink-soft); cursor: pointer;
      border-radius: 6px;
      transition: background 120ms ease, color 120ms ease;
    }
    .seg > button.on {
      background: var(--bg); color: var(--ink);
      box-shadow: 0 1px 2px color-mix(in oklch, var(--ink) 8%, transparent);
    }

    /* Sliders (reuse landing) */
    input[type="range"] {
      -webkit-appearance: none; appearance: none;
      background: transparent; width: 100%; height: 22px;
    }
    input[type="range"]::-webkit-slider-runnable-track { height: 1px; background: var(--line); }
    input[type="range"]::-moz-range-track            { height: 1px; background: var(--line); }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 14px; height: 14px; border-radius: 999px;
      background: var(--ink); margin-top: -7px;
      cursor: ew-resize; transition: transform 120ms ease;
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }

    /* Utility */
    .row { display: flex; }
    .col { display: flex; flex-direction: column; }
    .between { display: flex; justify-content: space-between; }
    .between-bl { display: flex; justify-content: space-between; align-items: baseline; }
    .between-ct { display: flex; justify-content: space-between; align-items: center; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .gap-4 { gap: 16px; }
    .gap-5 { gap: 20px; }
    .gap-6 { gap: 24px; }
    .gap-8 { gap: 32px; }
    .mt-2 { margin-top: 8px; }
    .mt-3 { margin-top: 12px; }
    .mt-4 { margin-top: 16px; }
    .mt-5 { margin-top: 20px; }
    .mt-6 { margin-top: 24px; }
    .mt-8 { margin-top: 32px; }
    .mb-2 { margin-bottom: 8px; }
    .mb-3 { margin-bottom: 12px; }
    .mb-4 { margin-bottom: 16px; }
    .mb-5 { margin-bottom: 20px; }
    .mb-6 { margin-bottom: 24px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .ar { text-align: right; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--ink); color: var(--bg);
      padding: 10px 18px; border-radius: 999px;
      font-size: 13px;
      z-index: 200;
      animation: toast 2200ms ease;
      pointer-events: none;
    }
    @keyframes toast {
      0% { opacity: 0; transform: translate(-50%, 8px); }
      10%, 80% { opacity: 1; transform: translate(-50%, 0); }
      100% { opacity: 0; transform: translate(-50%, -8px); }
    }

    /* Responsive */
    @media (max-width: 1100px) {
      .stat-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 880px) {
      .app { grid-template-columns: 1fr; }
      .side { display: none; }
      .stat-grid { grid-template-columns: 1fr; }
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    }
  </style>
</head>
