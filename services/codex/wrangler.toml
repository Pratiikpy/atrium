name = "atrium-codex"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "atrium-codex"
database_id = "8b12341f-c7a7-4b22-a5bf-28e5dc131bf1"

[vars]
ENV = "production"
# Iteration 41/42 audit fix: PLACEHOLDER values must be obviously non-hex /
# non-URL so the server's runtime validation rejects them. Pre-fix
# CODEX_PAY_TO_ADDRESS defaulted to 0x000...0, structurally valid hex,
# truthy in JS, and accepted by the original `if (!expectedPayTo)` check.
# An attacker burning USDC to 0x0 would satisfy payment verification.
# Now: the placeholders fail format-validation outright so a deploy that
# forgets to override them fails fast at the first /v1/* request rather
# than silently accepting free traffic. Wrangler does not error on these
# at deploy time because they're vars (not bindings); the server is the
# gate. See services/codex/src/middleware/x402.ts iter-42 guard.
SCRIBE_URL = "https://api.studio.thegraph.com/query/1753863/atrium-arbitrum-sepolia/v0.0.8"
ARBITRUM_SEPOLIA_RPC = "https://sepolia-rollup.arbitrum.io/rpc"
# Audit K-9 fix: x402 verifier needs these to validate USDC Transfer logs.
# Arbitrum Sepolia USDC (verified at https://docs.circle.com/stablecoins/usdc-on-test-networks).
CODEX_USDC_ADDRESS = "0x75faf114eafb1BDbe2F0316DF893fd58CE46AA4d"
# Live x402 payout address (2026-06-07): a dedicated testnet wallet created
# for this deployment; its private key is held off-repo by the founder
# (~/.atrium/codex-payout-key.txt). The worker reads this var directly
# (x402.ts:53,154) - there is NO secret-named override, so the real payout
# address must live here. Pre-2026-06-07 this was the leaked deployer EOA
# 0x7DB1c02a (see incidents/); routing x402 payments there was the bug this
# fixes. For a public-repo fork, replace with your own payout before deploy.
CODEX_PAY_TO_ADDRESS = "0xca31484DDd43B74516411CC1b9Ba32A0247dcbAf"
CODEX_MIN_PAYMENT_USDC_WEI = "1000000"                                # $1.00 USDC (6 decimals)
# Optional: Kani CI status proxy for the verify.useatrium.me badge.
# Leave commented to render the badge in the honest "unknown" state.
# KANI_STATUS_URL = "https://raw.githubusercontent.com/Pratiikpy/<repo>/main/apps/verify/public/kani-status.json"

# Secrets (set via wrangler secret put NAME):
#  - CODEX_HMAC_KEY                  HMAC key for response signatures (rotated quarterly)
#  - CODEX_KEY_ID                    Current key version, e.g. "v1"
#  - COINBASE_X402_API_KEY           x402 facilitator credential (optional; chain is authoritative)
#  - POSTGRES_URL                    Read-only Codex Postgres URL (if used in fallback)
